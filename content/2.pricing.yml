faq:
  title: Preguntas frecuentes
  description: Encuentra respuestas a las preguntas más comunes sobre nuestros planes y servicios.
  items:
    - label: ¿Es seguro el servicio?
      content: Sí, Prevenius cumple con los más altos estándares de seguridad y protección de datos en la industria de la construcción. Todos los datos se almacenan en servidores certificados y se transmiten mediante conexiones encriptadas.
      defaultOpen: true
    - label: ¿Cómo puedo cancelar mi suscripción?
      content: Puedes cancelar tu suscripción en cualquier momento desde la sección de configuración de tu cuenta. Tu acceso continuará hasta el final del período de facturación actual.
    - label: ¿Ofrecen planes personalizados para grandes empresas?
      content: Sí, tenemos planes personalizados para grandes constructoras con necesidades específicas. Contacta con nuestro equipo de ventas para discutir una solución adaptada a tus necesidades.
    - label: ¿Puedo cambiar de plan más adelante?
      content: Por supuesto. Puedes actualizar o degradar tu plan en cualquier momento. Los cambios se aplican de forma prorrateada según el tiempo restante en tu período de facturación actual.
    - label: ¿Ofrecen reembolsos?
      content: Ofrecemos una garantía de satisfacción de 30 días. Si no estás satisfecho con nuestro servicio en ese período, contacta con soporte para solicitar un reembolso.
    - label: ¿Qué tipo de soporte ofrecen?
      content: Ofrecemos soporte técnico por email para todos los planes, con tiempos de respuesta garantizados de 24-48 horas. Los planes Profesional y Empresa incluyen soporte prioritario y 24/7 respectivamente.
