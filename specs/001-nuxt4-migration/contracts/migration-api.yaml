openapi: 3.0.3
info:
  title: Nuxt Migration API
  description: API for managing Nuxt 3 to Nuxt 4 migration process
  version: 1.0.0

paths:
  /api/migration/status:
    get:
      summary: Get current migration status
      tags:
        - Migration
      responses:
        '200':
          description: Migration status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationStatus'


  /api/migration/start:
    post:
      summary: Initiate migration process
      tags:
        - Migration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigrationRequest'
      responses:
        '200':
          description: Migration started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationResponse'
        '400':
          description: Invalid migration request
        '409':
          description: Migration already in progress

  /api/migration/validate:
    post:
      summary: Run migration validation tests
      tags:
        - Migration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidationRequest'
      responses:
        '200':
          description: Validation completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResponse'

  /api/migration/rollback:
    post:
      summary: Rollback migration if possible
      tags:
        - Migration
      responses:
        '200':
          description: Rollback completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RollbackResponse'
        '410':
          description: Rollback not available

  /api/migration/dependencies:
    get:
      summary: Get dependency resolution status
      tags:
        - Migration
      responses:
        '200':
          description: Dependency status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DependencyStatus'

  /api/migration/compatibility:
    get:
      summary: Get compatibility layer status
      tags:
        - Migration
      responses:
        '200':
          description: Compatibility status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompatibilityStatus'

components:
  schemas:
    MigrationStatus:
      type: object
      properties:
        phase:
          type: string
          enum: ['preparation', 'migration', 'validation', 'completed']
        progress:
          type: number
          minimum: 0
          maximum: 100
        startedAt:
          type: string
          format: date-time
        estimatedCompletion:
          type: string
          format: date-time
        rollbackAvailable:
          type: boolean
        currentStep:
          type: string
        steps:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
                enum: ['pending', 'in-progress', 'completed', 'failed']
              progress:
                type: number
                minimum: 0
                maximum: 100

    MigrationRequest:
      type: object
      required:
        - targetVersion
        - enableCompatibilityMode
      properties:
        targetVersion:
          type: string
          pattern: '^4\.\d+\.\d+$'
        enableCompatibilityMode:
          type: boolean
        featureFlags:
          type: object
          properties:
            useNitroV3:
              type: boolean
            enableWASM:
              type: boolean
            enhancedTypeCheck:
              type: boolean
        backupBeforeMigration:
          type: boolean
          default: true

    MigrationResponse:
      type: object
      properties:
        migrationId:
          type: string
          format: uuid
        status:
          type: string
          enum: ['started', 'queued']
        estimatedDuration:
          type: string
        rollbackPlan:
          type: string
        validationResults:
          type: array
          items:
            $ref: '#/components/schemas/ValidationResult'

    ValidationRequest:
      type: object
      required:
        - testSuite
      properties:
        testSuite:
          type: string
          enum: ['functional', 'performance', 'compliance', 'integration', 'all']
        specificTests:
          type: array
          items:
            type: string
        parallel:
          type: boolean
          default: true

    ValidationResponse:
      type: object
      properties:
        suiteId:
          type: string
          format: uuid
        status:
          type: string
          enum: ['running', 'completed', 'failed']
        progress:
          type: number
          minimum: 0
          maximum: 100
        results:
          type: array
          items:
            $ref: '#/components/schemas/ValidationResult'
        summary:
          type: object
          properties:
            total:
              type: integer
            passed:
              type: integer
            failed:
              type: integer
            skipped:
              type: integer
            passRate:
              type: number
              minimum: 0
              maximum: 100

    ValidationResult:
      type: object
      properties:
        testId:
          type: string
        testName:
          type: string
        category:
          type: string
          enum: ['functional', 'performance', 'compliance', 'integration']
        status:
          type: string
          enum: ['passing', 'failing', 'skipped']
        duration:
          type: number
        errorMessage:
          type: string
        performanceMetrics:
          type: object
          properties:
            responseTime:
              type: number
            memoryUsage:
              type: number
            buildTime:
              type: number

    RollbackResponse:
      type: object
      properties:
        status:
          type: string
          enum: ['initiated', 'completed', 'failed']
        rollbackId:
          type: string
          format: uuid
        affectedComponents:
          type: array
          items:
            type: string
        estimatedDuration:
          type: string
        validationRequired:
          type: boolean

    DependencyStatus:
      type: object
      properties:
        totalDependencies:
          type: integer
        resolvedDependencies:
          type: integer
        conflictingDependencies:
          type: integer
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/DependencyInfo'

    DependencyInfo:
      type: object
      properties:
        name:
          type: string
        currentVersion:
          type: string
        targetVersion:
          type: string
        status:
          type: string
          enum: ['compatible', 'conflict', 'resolved', 'requires-shim']
        resolutionStrategy:
          type: string
          enum: ['upgrade', 'replace', 'shim', 'manual']
        estimatedEffort:
          type: number
        dependencies:
          type: array
          items:
            type: string

    CompatibilityStatus:
      type: object
      properties:
        totalLayers:
          type: integer
        activeLayers:
          type: integer
        layers:
          type: array
          items:
            $ref: '#/components/schemas/CompatibilityLayer'

    CompatibilityLayer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: ['config', 'component', 'composable', 'api-route']
        status:
          type: string
          enum: ['pending', 'active', 'deprecated', 'removed']
        deprecatedPattern:
          type: string
        nuxt4Pattern:
          type: string
        autoMigrate:
          type: boolean
        priority:
          type: string
          enum: ['high', 'medium', 'low']

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []